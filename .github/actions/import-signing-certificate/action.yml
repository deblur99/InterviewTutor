name: Import signing certificate
description: Import Developer ID certificate into a temporary CI keychain

inputs:
  certificate-p12:
    description: Base64-encoded .p12 certificate
    required: true
  certificate-password:
    description: Password for the .p12 file
    required: true

runs:
  using: composite
  steps:
    - name: Import certificate
      shell: bash
      env:
        DEVELOPER_ID_CERTIFICATE_P12: ${{ inputs.certificate-p12 }}
        DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ inputs.certificate-password }}
      run: |
        set -euo pipefail
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        echo -n "$DEVELOPER_ID_CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" \
          -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
          -A \
          -t cert \
          -f pkcs12 \
          -k "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
          | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' \
          | head -n 1)

        if [[ -z "$SIGNING_IDENTITY" ]]; then
          echo "Developer ID Application identity not found in imported keychain." >&2
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          exit 1
        fi

        echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        echo "Using signing identity: $SIGNING_IDENTITY"
