# macOS 26 + Xcode 26 이상이 필요합니다.
# GitHub-hosted runner(macos-15 등)에서는 빌드·테스트 모두 불가하므로
# self-hosted runner(macOS 26)에서만 실행하세요.
#
# Runner 라벨 예시: self-hosted, macOS, macos-26
# 등록: GitHub Repo → Settings → Actions → Runners → New self-hosted runner

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      skip_tests:
        description: "Skip unit/UI tests (not recommended)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  SCHEME: InterviewTutor
  APP_NAME: InterviewTutor
  BUNDLE_ID: com.deblurlab.InterviewTutor

jobs:
  test:
    name: Test
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
    runs-on: [self-hosted, macOS, macos-26]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner environment
        run: |
          set -euo pipefail
          XCODE_APP_PATH="${{ vars.XCODE_APP_PATH }}"
          if [[ -z "$XCODE_APP_PATH" ]]; then
            XCODE_APP_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "${XCODE_APP_PATH}/Contents/Developer"
          xcodebuild -version
          sw_vers

          MACOS_MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          if [[ "$MACOS_MAJOR" -lt 26 ]]; then
            echo "This project requires macOS 26+. Runner: $(sw_vers -productVersion)" >&2
            exit 1
          fi

          XCODE_MAJOR=$(xcodebuild -version | head -n1 | grep -oE '[0-9]+' | head -n1)
          if [[ "$XCODE_MAJOR" -lt 26 ]]; then
            echo "This project requires Xcode 26+. Found: $(xcodebuild -version | head -n1)" >&2
            exit 1
          fi

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorTests \
            -resultBundlePath UnitTestResults.xcresult

      - name: Run UI tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorUITests \
            -resultBundlePath UITestResults.xcresult

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: UnitTestResults.xcresult
          if-no-files-found: ignore

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          if-no-files-found: ignore

  release:
    name: Build, Sign, Notarize & Publish
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: [self-hosted, macOS, macos-26]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "Could not resolve release version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact=${APP_NAME}-${VERSION}-macOS.zip" >> "$GITHUB_OUTPUT"

      - name: Verify runner environment
        run: |
          set -euo pipefail
          XCODE_APP_PATH="${{ vars.XCODE_APP_PATH }}"
          if [[ -z "$XCODE_APP_PATH" ]]; then
            XCODE_APP_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "${XCODE_APP_PATH}/Contents/Developer"
          xcodebuild -version
          sw_vers

          MACOS_MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          if [[ "$MACOS_MAJOR" -lt 26 ]]; then
            echo "This project requires macOS 26+. Runner: $(sw_vers -productVersion)" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$DEVELOPER_ID_CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' \
            | head -n 1)

          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "Developer ID Application identity not found in imported keychain." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build Release (Developer ID)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild build \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

          APP_PATH="DerivedData/Build/Products/Release/${APP_NAME}.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Built app not found at $APP_PATH" >&2
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Verify code signature
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"

      - name: Create ZIP for notarization
        run: |
          ditto -c -k --keepParent "$APP_PATH" "${{ steps.version.outputs.artifact }}"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "${{ steps.version.outputs.artifact }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv "$APP_PATH"

      - name: Re-create ZIP after staple
        run: |
          ditto -c -k --keepParent "$APP_PATH" "${{ steps.version.outputs.artifact }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.version.outputs.artifact }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Clean up keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
