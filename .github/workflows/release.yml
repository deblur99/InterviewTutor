# Public repo 배포 전략
#
# macOS 26 + Xcode 26이 필요해 GitHub-hosted runner에서는 빌드·공증을 할 수 없습니다.
# self-hosted runner는 public repo에서 보안상 권장되지 않습니다.
#
# 따라서:
#   1. 로컬에서 테스트·빌드·서명·공증 (scripts/publish-release.sh)
#   2. 이 워크플로는 공증된 ZIP 아티팩트를 받아 GitHub Release만 게시
#
# 서명 인증서·공증 비밀번호는 로컬 키체인에만 두면 됩니다 (GitHub Secrets 불필요).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: InterviewTutor

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact=${APP_NAME}-${VERSION}-macOS.zip" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Waiting for local upload:"
          echo "  ./scripts/publish-release.sh $VERSION"
          echo ""
          echo "Or manually:"
          echo "  gh run upload ${{ github.run_id }} InterviewTutor-${VERSION}-macOS.zip --name InterviewTutor-${VERSION}-macOS.zip"

      - name: Wait for local artifact upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ARTIFACT="${{ steps.meta.outputs.artifact }}"
          for attempt in $(seq 1 120); do
            COUNT=$(gh api \
              "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              --jq "[.artifacts[] | select(.name == \"${ARTIFACT}\")] | length")
            if [[ "$COUNT" -ge 1 ]]; then
              echo "Artifact uploaded: ${ARTIFACT}"
              exit 0
            fi
            echo "Waiting for ${ARTIFACT}... (${attempt}/120)"
            sleep 30
          done
          echo "Timed out waiting for local artifact upload." >&2
          exit 1

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: dist
          github-token: ${{ github.token }}
          run-id: ${{ github.run_id }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: dist/${{ steps.meta.outputs.artifact }}
          generate_release_notes: true
          draft: false
          prerelease: false
