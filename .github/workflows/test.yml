# PR·main 푸시 시 self-hosted macOS 26 runner에서 테스트만 실행합니다.
# GitHub-hosted runner(macos-15)에서는 macOS 26 SDK가 없어 실행할 수 없습니다.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit & UI Tests
    runs-on: [self-hosted, macOS, macos-26]
    env:
      SCHEME: InterviewTutor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner environment
        run: |
          set -euo pipefail
          XCODE_APP_PATH="${{ vars.XCODE_APP_PATH }}"
          if [[ -z "$XCODE_APP_PATH" ]]; then
            XCODE_APP_PATH="/Applications/Xcode.app"
          fi
          sudo xcode-select -s "${XCODE_APP_PATH}/Contents/Developer"
          xcodebuild -version
          sw_vers

          MACOS_MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          if [[ "$MACOS_MAJOR" -lt 26 ]]; then
            echo "This project requires macOS 26+. Runner: $(sw_vers -productVersion)" >&2
            exit 1
          fi

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorTests \
            -resultBundlePath UnitTestResults.xcresult

      - name: Run UI tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorUITests \
            -resultBundlePath UITestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            UnitTestResults.xcresult
            UITestResults.xcresult
          if-no-files-found: ignore
