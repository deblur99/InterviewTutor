# PR·main 푸시 시 macos-26 GitHub-hosted runner에서 테스트를 실행합니다.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: InterviewTutor

jobs:
  test:
    name: Unit & UI Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        uses: ./.github/actions/import-signing-certificate
        with:
          certificate-p12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          certificate-password: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}

      - name: Show toolchain
        run: |
          xcodebuild -version
          sw_vers

      - name: Run unit tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorTests \
            -resultBundlePath UnitTestResults.xcresult \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Run UI tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorUITests \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            UnitTestResults.xcresult
            UITestResults.xcresult
          if-no-files-found: ignore

      - name: Clean up keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
