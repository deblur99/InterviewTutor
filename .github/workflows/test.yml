# PR·main 푸시 시 macos-26 GitHub-hosted runner에서 테스트를 실행합니다.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: InterviewTutor

jobs:
  test:
    name: Unit & UI Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          sw_vers

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorTests \
            -resultBundlePath UnitTestResults.xcresult

      - name: Run UI tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project InterviewTutor.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:InterviewTutorUITests \
            -resultBundlePath UITestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            UnitTestResults.xcresult
            UITestResults.xcresult
          if-no-files-found: ignore
